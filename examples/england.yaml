study_area_name: England
crs: EPSG:27700

data:
  buildings: /data/input/Verisk/Buildings_6183/edition_17_0_new_format.gpkg
  trees_dir: /data/output/3-30-300/VOM_Trees_unique
  parks_sites: /data/input/OS/Green_Spaces/opgrsp_gb.gpkg
  parks_access: /data/input/OS/Green_Spaces/opgrsp_gb.gpkg
  roads: /data/input/OS/Roads/oproad_gb.gpkg
  census_boundaries: /data/input/ONS/Output_Areas_(December_2021)_Boundaries_EW_BFE_(V9).geojson
  chm_tiles_dir: /data/input/Defra/VOM/unzipped_tiles

columns:
